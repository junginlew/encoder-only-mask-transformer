# @package _global_
defaults:
  - /augmentation: eomt_aug
  - /optimizer: eomt/adamw
  - override /model: eomt/eomt-vitl
  - override /data: aidall
  - override /runtime: gpu
  - override /callbacks: default
  - _self_

seed: 42
optimized_metric: "val/mean_iou"

model:
  num_classes: 18        # EoMTLightningModule → SegmentationLightningModule (metrics 초기화)
  model:
    num_classes: 18      # EoMT (class_head 크기 결정)
  criterion:
    num_classes: 18      # EoMTLoss (Hungarian matching 클래스 수)
  warmup_steps: [500, 1000]  # [non-backbone warmup, backbone warmup]
  attn_mask_annealing_start_steps: [0, 0, 0, 0]
  attn_mask_annealing_end_steps: [40000, 80000, 120000, 160000]

data:
  train_batch_size: 2
  val_batch_size: 2
  train_num_workers: 4
  val_num_workers: 4

callbacks:
  patience: 20
  early_stopping:
    monitor: "val/loss_total"
  model_checkpoint:
    monitor: "val/loss_total"

trainer:
  max_steps: 160000
  check_val_every_n_epoch: 1 
  accumulate_grad_batches: 32  # 배치 2장 × 32번 누적 후 업데이트 (effective batch size = 64)
